<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>오프라인 - QRIOUS</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #fef7ee;
      color: #401509;
      padding: 1rem;
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #762f15; margin-bottom: 1.5rem; }
    button {
      background: #ec751c;
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
    }
    button:hover { background: #dd5b12; }
  </style>
</head>
<body>
  <h1>오프라인입니다</h1>
  <p>네트워크에 연결된 후 새로고침 해 주세요.</p>
  <button type="button" onclick="window.location.reload()">새로고침</button>
</body>
</html>
